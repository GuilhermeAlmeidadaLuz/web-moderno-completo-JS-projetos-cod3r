<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>CSS Selectors</title>

        /* ... */

            background-color: #f77;

        } */

        /* #aninhado > div {
            color: #ff0;
            background-color: #f77;
        } */

        /* #aninhado > section {
            /* não conseguiu, pois não é filho direto */ /*
            color: #ff0;
            background-color: #f77;
        } */

        /* #aninhado section {
            color: #ff0;
            background-color: #f77;
        } */

        /* p + ul {
            color: #ff0;
            background-color: #f77;
        } */

        /* p + ol { 
            /* não conseguiu, pois ol não é irmão adjacente */ /*
            color: #ff0;
            background-color: #f77;
        } */

        /* p ~ ol { 
            /* conseguiu, pois ol é irmão geral */ /*
            color: #ff0;
            background-color: #f77;
        } */

        /* [feira]  */
        
        /* [feira=casa]  */

        /* não conseguiu: */
        /* [feira=escritorio]  */
        
        /* conseguiu por generalização com ~:  */
        /* [feira~=escritorio] */
        
        /* verificação se está contido o trecho na propriedade:  */
        /* [feira*=asa] */
        
        /* span:nth-child(1) */
        
        /* ideia para seleção intercalada */
        /* section > :nth-child(odd) */
        
        /* section > :nth-child(odd), ul, p */
        
        /* section > :nth-child(odd) label */

        section > span:nth-of-type(2)
        {
            color: #ff0;
            background-color: #f77;
        }

    </style>
</head>

<body>
    <div class='tag'>
        <div class='tag'>
            <p class='tag'>1</p>
            <ul class='tag' feira='casa'>
                <li>Arroz</li>
                <li>Feijão</li>
            </ul>
            <ul class='tag' feira='escritorio empresa'>
                <li>Café</li>
                <li>Água</li>
            </ul>
            <ol id='aprovados' class='tag'>
                <li>Maria</li>
                <li>Pedro</li>
                <li>Ana</li>
            </ol>
            <div id='aninhado' class='tag'>
                <div class="tag">
                    <section class='tag nolabel'>
                        <span class='tag'>1</span>
                        <p class='tag'>2</p>
                        <span class='tag'>3</span>
                    </section>
                </div>
            </div>
        </div>
    </div>
    <script src="js/239_tag.js"></script>
</body>

</html>

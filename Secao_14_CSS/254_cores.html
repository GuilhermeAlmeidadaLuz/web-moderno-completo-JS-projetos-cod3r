<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Cores</title>
    <style>
        /* 
            https://www.w3schools.com/colors/colors_hsl.asp
            
            https://coolors.co/
            http://paletton.com/
        */

        body {
            /* nome da cor: */
            background-color: green;
            /* base hexadecimal: */
            background-color: #f67809;
            /* abrevia, se há repetição: */
            background-color: #aabbcc;
            background-color: #abc;
            /* aplica transparência nos 2 caracteres finais do hexadecimal - red, green, blue, transparency */
            background-color: #edc91280;
            /* abreviar transparência: ee992288*/
            background-color: #e928;
            /* função rgb para base decimal: */
            background-color: rgb(55, 110, 220);
            /* função rgba para base decimal com transparência: de 0 à 1 em porcentagem*/
            background-color: rgba(55, 110, 220, .5);

            /* hue, saturation, lightness (HSL): */
            background-color: hsl(299, 58%, 50%);
            /* hue, saturation, lightness (HSL) e transparancy: */
            background-color: hsla(299, 58%, 50%, 0.5);


        }
    </style>
</head>

<body>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Texto</title>
    <link href="https://fonts.googleapis.com/css?family=Indie+Flower" rel="stylesheet">
    <style>
        /* ... */
        * {
            margin: 0;
        }

        html {
            font-size: 28px;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        div {
            font-size: 50px;
        }

        p {
            /* valores padrões */
            font-size: 1em; /* relativo ao pai (tag -> ... -> body -> html -> (browser))*/
            font-size: 100%;
            font-size: 16px;
            font-size: 12pt;

            /* unidades absolutas */
            font-size: 100px; /* tamanho do pixel é relativo (depende da densidade da tela - dots per inch / pontos por polegada) */
            font-size: 72pt; /* pontos, mesmo que 1 inch */
            font-size: 1in;

            /* unidades relativas */
            font-size: 2.2em;   /* procura pela referência de fonte mais próxima declarada em um pai/ascendente (pai)*/
            font-size: 2.2rem;  /* com base na root/raiz como referência, ou seja, a tag html */
            font-size: 50vh;
            font-size: 10vw;

            font-family: monospace; /* fontes que cada letra ocupa o mesmo espaço */
            font-family: Georgia, serif;    /* fontes serifadas */
            font-family: Verdana, sans-serif /* fontes não-serifadas */;
            font-family: 'Indie Flower', cursive;   /* fontes cursivas */
            
            font-weight: 100;   /* também com valores pré-definidos: lighter, normal, bold, bolder*/
            font-style: italic; /* também com valores pré-definidos: ctrl+space */
            text-transform: uppercase; /* também com valores pré-definidos: ctrl+space */
            /* text-decoration: overline underline line-through; */
            word-spacing: 10px;
            letter-spacing: 20px;
            line-height: 2.5em;
            text-align: center;
        }

        .botao {
            font-size: 28px;
            text-decoration: none;
            padding: 10px 30px;
            border-radius: 25px;
        }

        .destaque {
            color: #fff;
            background-color: tomato;
            box-shadow: 2px 2px 1px 1px #000;
        }

        .destaque:active {
            box-shadow: none;
        }

    </style>
</head>

<body>
    <div>
        <p>
            Que texto
            <br>legal!!!
        </p>
    </div>
    <a href="http://google.com" class="botao destaque">Google</a>
</body>

</html>
